services:
  db:
    image: postgres:15-alpine
    container_name: innovatech-db
    environment:
      POSTGRES_DB: innovatech_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net

  back-despachos:
    build: ./back-Despachos
    container_name: back-despachos
    depends_on:
      - db
    networks:
      - backend-net

  back-ventas:
    build: ./back-Ventas_Spring
    container_name: back-ventas
    depends_on:
      - db
    networks:
      - backend-net

  frontend:
    build: ./front_despacho
    container_name: front-despacho
    ports:
      - "80:80"
    networks:
      - backend-net
      - frontend-net

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

volumes:
  postgres_data: