name: CI/CD Innovatech

on:
  push:
    branches: [ "main" ] # Cambia a "deploy" cuando estés listo para la entrega final

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Desplegar en EC2 vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Crear carpeta del proyecto si no existe
            mkdir -p ~/innovatech
            cd ~/innovatech
            
            # 2. Clonar o actualizar el código (usamos el repo público para facilitar)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/Benjamin-Aburto/Innovatech.git .
            fi
            
            # 3. Levantar con Docker Compose
            docker-compose up -d --build